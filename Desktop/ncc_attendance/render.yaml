services:
  - type: web
    name: ncc-attendance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_REGIMENTAL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: NCC Admin
      - key: ADMIN_UNIT
        value: Head Office
      - key: FRONTEND_URL
        sync: false
